name: "Run Visual Regression Tests"

"on":
    workflow_dispatch:
    pull_request:
        types:
            - opened
            - synchronize
        paths:
            - packages/core/**

permissions:
    id-token: write
    contents: read

env:
    BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
    AWS_REGION: ${{ secrets.AWS_REGION }}
    AWS_IAM_ROLE_NAME: ${{ secrets.AWS_IAM_ROLE_NAME }}
    AWS_IAM_ROLE_SESSION_NAME: ${{ secrets.AWS_IAM_ROLE_SESSION_NAME }}
    REPORT_PATH: ""

jobs:
    visual-regression:
        runs-on: macos-latest
        steps:
            - name: Git clone the repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Dependencies
              uses: ./.github/composite/install

            - name: Install Playwright Browsers
              uses: ./.github/composite/browser-install
              with:
                  working-directory: packages/core

            - name: Build Icons
              run: pnpm icons build

            - name: Build Storybook
              run: pnpm build:storybook

            - name: Run Snapshot Tests
              run: pnpm core test:regressions

            - uses: actions/upload-artifact@v4
              if: "${{ !cancelled() }}"
              with:
                  name: test-results
                  path: ./packages/core/__tests__/report/
