name: Visual Regression Test

on:
    workflow_dispatch:
    pull_request:
        types:
            - opened
            - synchronize
        paths:
            - packages/core/**

jobs:
    test_regressions:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        # strategy:
        #     fail-fast: false
        #     matrix:
        #         shardIndex: [1, 2, 3, 4]
        #         shardTotal: [4]
        container:
            image: mcr.microsoft.com/playwright:v1.55.0-noble
            options: --user 1001
        steps:
            - name: Git clone the repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Install Dependencies
              uses: ./.github/composite/install
            - name: Build Icons
              run: pnpm build --filter=@vapor-ui/icons
            - name: Build Storybook
              run: pnpm build-storybook
            # - name: Run Playwright tests
            #   run: pnpm core exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
            #   run: pnpm core exec playwright test

            - name: Playwright tests 1/4
              run: pnpm core exec playwright test --shard=1/4
            - name: Playwright tests 2/4
              run: pnpm core exec playwright test --shard=2/4
            - name: Playwright tests 3/4
              run: pnpm core exec playwright test --shard=3/4
            - name: Playwright tests 4/4
              run: pnpm core exec playwright test --shard=4/4

            - name: Upload Snapshots
              run: pnpm core exec -- argos upload ./__tests__/screenshots --token=${{ secrets.ARGOS_TOKEN }}
